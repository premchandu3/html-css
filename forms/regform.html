<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regestration Form</title>
</head>

<body>
    <form action="#" method="post">
        <h2>Registartion Form </h2>
        <label for="fullname">Full Name:</label>
        <input type="text" id="fullname" name="fullname" placeholder="Enter Your Full name" minlength="3" required>
        <br><br>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="You@gmail.com" required>
        <br><br>
        <label for="phonenumber">Phone Number:</label>
        <input type="tel" id="phonenumber" name="phonenumber" placeholder="123-456-7890"
            pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}" required>
        <br><br>
        <label for=" password">Password:</label>
        <input type="password" id="password" name="password" minlength="5" maxlength="13"
            pattern="[a-zA-Z0-9!@#$%^&*().,]+" placeholder="Enter Your Password" required>
        <br><br>
        <label>Gender:</label>
        <input type="radio" name="gender" value="male">Male
        <input type="radio" name="gender" value="Female">Female
        <input type="radio" name="gender" value="other">Other
        <br><br>
        <label for="skills">Skills:</label>
        <input type="checkbox" name="skills" value="HTML">HTML
        <input type="checkbox" name="skills" values="CSS">CSS
        <input type="checkbox" name="skills" value="JAVASCRIPT">JAVASCRIPT
        <br><br>
        <label for="country">Country:</label>
        <select>
            <option value="">select</option>
            <option value="India">India</option>
            <option value="Singhapur">Singhapur</option>
            <option value="USA">USA</option>
            <option value="UK">UK</option>
        </select>
        <br><br>
        <label for="dob">DOB:</label>
        <input type="date" id="dob" name="dob" min="1950-01-01" max="2030-12-31">
        <br><br>
        <label for="address">Address</label>
        <textarea id="address" name="address" rows="4" cols="50" placeholder="Enter Your Address">
        </textarea>
        <br><br>
        <input type="submit" value="Register">
        <input type="reset" value="Reset">
    </form>
</body>

</html>
