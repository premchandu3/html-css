<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
</head>

<body>

    <h2>Login Form</h2>

    <form action="#" method="post">

        <label for="username">Username:</label><br>
        <input type="text" id="username" name="username" placeholder="Enter your username" minlength="5" maxlength="15"
            required><br><br>

        <label for="password">Password:</label><br>
        <input type="password" id="password" name="password" placeholder="Enter your password" minlength="4"
            maxlength="16" required><br><br>

        <button type="button">Forgot Password</button>
        <button type="submit">Login</button>

    </form>

</body>

</html>
