<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>

<body>
    <div>
        <dl>
            <dt>HTML</dt>
            <dd>A markup language for creating web pages.</dd>
            <dt>CSS</dt>
            <dd>Used to style HTML documents.</dd>
        </dl>
    </div>
    <div>
        <input type="text" placeholder="Enter name" minlength="3" maxlength="10" required>
        <br>
        <br>
        <input type="email" placeholder="you@gmail.com" required>
        <br>
        <br>
        <input type="tel" placeholder="123-456-7890" pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}">
        <br>
        <br>
        <input type="password" placeholder="password" minlength="4" maxlength="13">
        <br>
        <br>
        <input type="number" minlength="1" maxlength="1000">
        <br>
        <br>
        <input type="range" minlength="0" maxlength="50" step="5">
        <br>
        <br>
        <input type="date" min="1872-01-01" max="2045-12-31">
        <br>
        <br>
        <input type="time">
        <br>
        <br>
        <input type="week">
        <br>
        <br>
        <input type="month">
    </div>
    <div>
        <input type="checkbox">
        <input type="radio" name="gender" value="male" required>
        <input type="dropdown">
        <select required>
            <option value="">Select</option>
            <option>India</option>
            <option>USA</option>
        </select>
    </div>
    <button>Submit</button>
</body>

</html>
