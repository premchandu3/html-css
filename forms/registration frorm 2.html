<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>
<body>
    <Form action="#" method="post">
        <h2>Registration Form</h2>
        <label for="FullName">Full Name:</label>
        <input type ="text" id="fullname" name="fullname" placeholder="Enter fullname" minlength="2" required ><br><br>
        <label for="Phonenumber">Phone Number:</label>
        <input type="tel" id="phonenumber" name="phonenumber" placeholder="012-345-6789"
        pattern="[0-9{3}-[0-9]{3}-[0-9]{4}" maxlength="10" required><br><br>
        <label for="email">Email:</label>
        <input type="email" id:email name="email" placeholder="You@gmail.com" pattern="[a-zA-Z0-9!@#$%^&*():.]+"><br><br>
        <label for="Gender">Gender:</label>
        <input type="radio" name="Gender" value="Male">Male
        <input type="radio" name="Gender" value="Female">Female
        <input type="radio"  name="Gender" value="others">Oters
        <br><br>
        <include for="country">Country:</include>
        <select>
            <option type="">Select</option>
            <option type="india">india</option>
            <option type="china">china</option>
            <br><br>

        </select><br><br>
        <label for="DOB">Date of Birth</label>
            <input type="Data" id="DOB" name="DOB" min="1950-01-01" Max="2029-01-01" >

        <input type="submit" value="registration">
        <input type="reset" value="reset">

    </Form>
</body>
</html>
